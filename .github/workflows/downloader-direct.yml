name: downloader-direct

on:
  workflow_dispatch:
    inputs:
      url:
        description: >
          Enter one or more Direct Download URLs.
          Separate by commas, spaces, or newlines.
        required: true
      bundle_all:
        description: 'Bundle all downloaded files into a single split ZIP archive'
        type: boolean
        default: false
      upload_method:
        description: 'Upload destination'
        required: true
        type: choice
        options:
          - repo
          - release
          - drive
        default: repo
      # ── NEW INPUTS ───────────────────────────
      vpn_enabled:
        description: 'Route downloads through WireGuard VPN (requires secret WG_CONFIG)'
        type: boolean
        default: false
      concurrent_downloads:
        description: 'Number of URLs to download at the same time'
        type: number
        default: 4
        required: false
      # ─────────────────────────────────────────

permissions:
  contents: write

jobs:
  actions:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Install aria2
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq aria2

      # ── Parse URLs into a file (unchanged) ──
      - name: Parse URLs
        id: parse
        run: |
          URLS_INPUT="${{ github.event.inputs.url }}"
          URLS=$(echo "$URLS_INPUT" | tr ',' ' ' | tr '\n' ' ' | tr -s ' ' | sed 's/^ *//;s/ *$//')
          if [ -z "$URLS" ]; then
            echo "No URLs provided." >&2
            exit 1
          fi
          echo "$URLS" | tr ' ' '\n' > urls.txt
          echo "URLs to download:"
          cat urls.txt
          NUM=$(wc -l < urls.txt)
          echo "NUM_URLS=$NUM" >> $GITHUB_OUTPUT

      # ── VPN SETUP (identical to Spotify/YouTube) ──
      - name: '🔒 Set up WireGuard VPN (if enabled)'
        id: vpn
        shell: bash
        run: |
          VPN_ENABLED="${{ inputs.vpn_enabled }}"
          echo "VPN_ENABLED=$VPN_ENABLED"

          if [ "$VPN_ENABLED" = "true" ]; then
            if [ -z "${{ secrets.WG_CONFIG }}" ]; then
              echo "⚠️ VPN enabled but WG_CONFIG secret is empty – VPN disabled for this run."
              echo "vpn_available=false" >> $GITHUB_OUTPUT
              exit 0
            fi

            echo "→ Installing WireGuard tools..."
            sudo apt-get update -qq
            sudo apt-get install -y -qq wireguard-tools openresolv 2>/dev/null || sudo apt-get install -y -qq wireguard-tools

            echo "→ Writing WireGuard config..."
            cat <<'EOF' > /tmp/wg0.conf
          ${{ secrets.WG_CONFIG }}
          EOF
            sudo cp /tmp/wg0.conf /etc/wireguard/wg0.conf
            sudo chmod 600 /etc/wireguard/wg0.conf

            echo "→ Bringing up wg0..."
            if sudo wg-quick up wg0; then
              echo "✅ WireGuard VPN connected."
              echo "vpn_available=true" >> $GITHUB_OUTPUT
            else
              echo "⚠️ Failed to bring up WireGuard – VPN disabled."
              sudo wg-quick down wg0 2>/dev/null || true
              echo "vpn_available=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "vpn_available=false" >> $GITHUB_OUTPUT
          fi

      # ── Download in parallel (restructured) ──
      - name: Download all files concurrently
        run: |
          set -e
          VPN_AVAILABLE="${{ steps.vpn.outputs.vpn_available }}"
          CONCURRENT="${{ inputs.concurrent_downloads }}"
          OUTPUT_DIR="direct"
          DOWNLOAD_DIR="downloads_tmp"
          FAILED_FILE="failed_urls.txt"

          mkdir -p "$OUTPUT_DIR" "$DOWNLOAD_DIR"
          > "$FAILED_FILE"

          # Helper: download ONE URL
          download_one() {
            local url="$1"
            local dl_dir="dl_$$_$(echo "$url" | md5sum | cut -c1-8)"
            mkdir -p "$DOWNLOAD_DIR/$dl_dir"

            echo "→ Downloading: $url"
            if aria2c -x 16 -s 16 -d "$DOWNLOAD_DIR/$dl_dir" \
              --console-log-level=warn --summary-interval=10 "$url"; then
              # Move the downloaded file to the main downloads directory
              local dl_file=$(ls -1 "$DOWNLOAD_DIR/$dl_dir" | head -n1)
              if [ -n "$dl_file" ]; then
                mv "$DOWNLOAD_DIR/$dl_dir/$dl_file" "$DOWNLOAD_DIR/"
                echo "✅ Success: $url -> $dl_file"
              else
                echo "❌ No file produced for: $url"
                echo "$url" >> "$FAILED_FILE"
              fi
            else
              echo "❌ Download failed: $url"
              echo "$url" >> "$FAILED_FILE"
            fi
            rm -rf "$DOWNLOAD_DIR/$dl_dir"
          }

          export -f download_one
          export DOWNLOAD_DIR FAILED_FILE VPN_AVAILABLE

          # Run downloads in parallel (no VPN fallback per download to avoid conflicts)
          echo "→ Starting parallel downloads (concurrency: $CONCURRENT, VPN: $VPN_AVAILABLE)"
          cat urls.txt | xargs -P "$CONCURRENT" -I '{}' bash -c 'download_one "{}"'

          echo "📊 Downloads finished."
          echo "Files downloaded:"
          ls -la "$DOWNLOAD_DIR/"
        shell: bash

      # ── Process and zip (now safe because downloads are complete) ──
      - name: Zip and bundle files
        run: |
          BUNDLE_ALL="${{ github.event.inputs.bundle_all }}"
          UPLOAD_METHOD_INPUT="${{ inputs.upload_method }}"

          if [ "$UPLOAD_METHOD_INPUT" = "repo" ]; then
            UPLOAD_METHOD="split_push"
          else
            UPLOAD_METHOD="release"
          fi

          OUTPUT_DIR="direct"
          DOWNLOAD_DIR="downloads_tmp"
          FAILED_FILE="failed_urls.txt"

          # Move failed log if any
          if [ -s "$FAILED_FILE" ]; then
            RAND_FAIL=$(tr -dc 'a-z' </dev/urandom | head -c5)
            FAIL_NAME="links-failed-${RAND_FAIL}.txt"
            mv "$FAILED_FILE" "${OUTPUT_DIR}/$FAIL_NAME"
            echo "Created failure report: ${OUTPUT_DIR}/$FAIL_NAME"
          else
            rm -f "$FAILED_FILE"
          fi

          if [ "$BUNDLE_ALL" = "true" ]; then
            # Bundle all downloaded files
            BUNDLE_DIR="bundle_contents"
            mkdir -p "$BUNDLE_DIR"
            cp "$DOWNLOAD_DIR"/* "$BUNDLE_DIR/" 2>/dev/null || true
            if [ -n "$(ls -A "$BUNDLE_DIR" 2>/dev/null)" ]; then
              RAND_BUNDLE=$(tr -dc 'a-z' </dev/urandom | head -c5)
              BUNDLE_ZIP="bundle_${RAND_BUNDLE}.zip"
              echo "Creating bundle: $BUNDLE_ZIP"
              if [ "$UPLOAD_METHOD" = "release" ]; then
                (cd "$BUNDLE_DIR" && zip -0 "../${OUTPUT_DIR}/${BUNDLE_ZIP}" *)
                FULLBUNDLE="${OUTPUT_DIR}/${BUNDLE_ZIP}"
                SIZE=$(stat -c%s "$FULLBUNDLE" 2>/dev/null || echo 0)
                if [ "$SIZE" -gt 2044723200 ]; then
                  echo "Bundle ZIP larger than 1950 MiB, splitting"
                  rm "$FULLBUNDLE"
                  (cd "$BUNDLE_DIR" && zip -0 -s 1950m "../${OUTPUT_DIR}/${BUNDLE_ZIP}" *)
                fi
              else
                (cd "$BUNDLE_DIR" && zip -0 -s 99m "../${OUTPUT_DIR}/${BUNDLE_ZIP}" *)
              fi
              rm -rf "$BUNDLE_DIR"
            else
              echo "No files to bundle."
              rm -rf "$BUNDLE_DIR"
            fi
          else
            # One ZIP per file
            for f in "$DOWNLOAD_DIR"/*; do
              [ -f "$f" ] || continue
              fname=$(basename "$f")
              RAND5=$(tr -dc 'a-z' </dev/urandom | head -c5)
              ZIP_BASE="${fname}_${RAND5}"
              ZIP_NAME="${ZIP_BASE}.zip"
              echo "Zipping: $fname → $ZIP_NAME"

              TMPZIP="tmpzip_$$"
              mkdir -p "$TMPZIP"
              cp "$f" "$TMPZIP/"

              if [ "$UPLOAD_METHOD" = "release" ]; then
                (cd "$TMPZIP" && zip -0 "../${OUTPUT_DIR}/${ZIP_NAME}" "$fname")
                FULLZIP="${OUTPUT_DIR}/${ZIP_NAME}"
                SIZE=$(stat -c%s "$FULLZIP" 2>/dev/null || echo 0)
                if [ "$SIZE" -gt 2044723200 ]; then
                  echo "ZIP larger than 1950 MiB, splitting"
                  rm "$FULLZIP"
                  (cd "$TMPZIP" && zip -0 -s 1950m "../${OUTPUT_DIR}/${ZIP_NAME}" "$fname")
                fi
              else
                (cd "$TMPZIP" && zip -0 -s 99m "../${OUTPUT_DIR}/${ZIP_NAME}" "$fname")
              fi
              rm -rf "$TMPZIP"
            done
          fi

          # Cleanup download dir
          rm -rf "$DOWNLOAD_DIR"

          ls -1 "$OUTPUT_DIR" > "${OUTPUT_DIR}_assets.txt"
          echo "Assets to upload:"
          cat "${OUTPUT_DIR}_assets.txt"
        shell: bash

      # ── Tear down VPN before any upload (identical to previous) ──
      - name: ' Disconnect VPN for uploads'
        if: steps.vpn.outputs.vpn_available == 'true'
        run: |
          echo "→ Bringing down WireGuard to use runner's native internet for uploads"
          sudo wg-quick down wg0

      # ── Upload steps (unchanged, just like before) ──
      - name: "Upload to Google Drive"
        if: inputs.upload_method == 'drive'
        env:
          CLIENT_ID:     ${{ secrets.GOOGLE_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
        run: |
          # ... (exactly your Google Drive upload code) ...
          # (I've omitted it for brevity – keep your existing block)

      - name: Upload to repository (split_push method)
        if: ${{ inputs.upload_method == 'repo' }}
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          # ... (your existing repo push logic) ...

      - name: Create Release and upload assets (release method)
        if: ${{ inputs.upload_method == 'release' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # ... (your existing release logic) ...

      - name: Cleanup
        if: always()
        run: |
          rm -rf direct downloads_tmp urls.txt failed_urls.txt 2>/dev/null || true
          sudo wg-quick down wg0 2>/dev/null || true
